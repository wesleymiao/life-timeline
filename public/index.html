<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wesley's Life Timeline</title>
<style>
:root{--bg:#0f0f1a;--card:rgba(255,255,255,.06);--card-border:rgba(255,255,255,.1);--glass:rgba(255,255,255,.08);--glass-border:rgba(255,255,255,.15);--text:#e8e8f0;--text2:rgba(255,255,255,.5);--accent:#7c5bf5;--accent2:#c084fc;--accent-glow:rgba(124,91,245,.3);--border:rgba(255,255,255,.08)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"SF Pro Text","Helvetica Neue",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 0%,rgba(124,91,245,.15) 0%,transparent 50%),radial-gradient(ellipse at 80% 100%,rgba(192,132,252,.1) 0%,transparent 50%);pointer-events:none;z-index:0}

.header{backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);background:rgba(15,15,26,.7);border-bottom:1px solid var(--glass-border);color:#fff;padding:.6rem 1.5rem;position:sticky;top:0;z-index:100}
.header-row{display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.header h1{font-size:1.2rem;font-weight:700;background:linear-gradient(135deg,#e8e8f0,var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap;animation:fadeSlideIn .8s ease}
.nav{display:flex;gap:.4rem;flex-wrap:wrap}
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{box-shadow:0 0 20px var(--accent-glow)}50%{box-shadow:0 0 30px rgba(124,91,245,.5)}}
.nav button{backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);background:var(--glass);border:1px solid var(--glass-border);color:var(--text2);padding:5px 16px;border-radius:20px;cursor:pointer;font-size:.82rem;transition:all .3s;animation:fadeIn .6s ease backwards}
.nav button:nth-child(1){animation-delay:.1s}.nav button:nth-child(2){animation-delay:.2s}.nav button:nth-child(3){animation-delay:.3s}
.nav button:hover{background:rgba(255,255,255,.12);color:var(--text);border-color:rgba(255,255,255,.2)}
.nav button.active{background:rgba(124,91,245,.2);color:var(--accent2);font-weight:600;border-color:var(--accent);box-shadow:0 0 20px var(--accent-glow);animation:pulse 3s ease-in-out infinite}

.container{flex:1;min-width:0;padding:1rem;position:relative;z-index:1}
.day-card{backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);background:var(--card);border:1px solid var(--card-border);border-radius:16px;padding:1.5rem;margin-bottom:1.5rem;transition:all .3s;animation:slideUp .5s ease backwards}
.day-card:hover{background:rgba(255,255,255,.09);border-color:rgba(255,255,255,.18);box-shadow:0 8px 32px rgba(0,0,0,.3)}
.day-date{font-size:1.3rem;font-weight:700;color:var(--accent2);margin-bottom:.5rem;display:flex;align-items:center;gap:.5rem}
.day-date .weekday{font-size:.85rem;color:var(--text2);font-weight:400}
.summary-text{color:var(--text);margin-bottom:1rem;font-size:1rem;line-height:1.8;opacity:.85}
.meta-tags{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:1rem}
.tag{backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);background:rgba(124,91,245,.15);border:1px solid rgba(124,91,245,.25);color:var(--accent2);padding:4px 12px;border-radius:12px;font-size:.8rem}
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.75rem;margin-top:1rem}
.photo-item{position:relative;border-radius:12px;overflow:hidden;cursor:pointer;aspect-ratio:1;background:rgba(255,255,255,.03);border:1px solid var(--border)}
.photo-item img{width:100%;height:100%;object-fit:cover;transition:transform .3s,filter .3s}
.photo-item:hover img{transform:scale(1.05);filter:brightness(1.1)}
.photo-item:hover{box-shadow:0 0 20px var(--accent-glow);border-color:rgba(124,91,245,.3)}
.photo-caption{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.8));color:#fff;padding:2rem .75rem .75rem;font-size:.8rem}
.photo-time{font-weight:600;margin-bottom:2px}
.photo-loc{font-size:.7rem;opacity:.8;margin-top:2px}
.photo-comment-badge{position:absolute;top:8px;right:8px;background:var(--accent);color:#fff;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;box-shadow:0 2px 8px var(--accent-glow)}

.highlights{backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);background:rgba(255,200,50,.08);border:1px solid rgba(255,200,50,.15);padding:1rem;border-radius:12px;margin-bottom:1rem}
.highlights h4{color:#fbbf24;margin-bottom:.5rem;font-size:.9rem}
.highlights li{margin-left:1.2rem;color:var(--text);opacity:.8;font-size:.9rem}

.week-summary,.month-summary{backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);background:linear-gradient(135deg,rgba(124,91,245,.15),rgba(192,132,252,.1));border:1px solid rgba(124,91,245,.25);color:#fff;border-radius:16px;padding:2rem;margin-bottom:1.5rem}
.week-summary h3,.month-summary h3{margin-bottom:.5rem;color:var(--accent2)}

.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);z-index:1000;display:none;flex-direction:column;align-items:center;justify-content:center;padding:1rem}
.lightbox.show{display:flex}
.lb-img-wrap{position:relative;max-width:95%;max-height:60vh;overflow:hidden;border-radius:12px;touch-action:none;cursor:grab}
.lb-img-wrap.zoomed{cursor:move;overflow:visible;z-index:1002}
.lightbox img{width:100%;height:100%;max-height:60vh;object-fit:contain;box-shadow:0 0 60px rgba(0,0,0,.5);transform-origin:center center;transition:transform .2s ease;user-select:none;-webkit-user-drag:none;pointer-events:none}
.lightbox .close{position:absolute;top:1rem;right:1rem;color:#fff;font-size:2rem;cursor:pointer;background:none;border:none;z-index:1001;opacity:.6;transition:opacity .2s}
.lightbox .close:hover{opacity:1}
.lightbox .lb-hide{position:absolute;top:1rem;left:1rem;color:#fff;font-size:.85rem;cursor:pointer;background:rgba(255,100,100,.3);backdrop-filter:blur(10px);border:1px solid rgba(255,100,100,.3);border-radius:8px;padding:6px 14px;z-index:1001;transition:all .2s}
.lightbox .lb-hide:hover{background:rgba(255,80,80,.5)}
.lightbox .lb-bottom{position:absolute;bottom:0;left:0;right:0;max-height:35vh;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;align-items:center}
.lightbox .info{color:#fff;text-align:center;max-width:600px;padding:.75rem 1rem;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:12px 12px 0 0;width:100%}
.lb-comments{width:100%;max-width:600px;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-top:none;border-radius:0 0 12px 12px;padding:.75rem 1rem}
.lb-comments .comment-item{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.06);color:#eee;font-size:.85rem}
.lb-comments .comment-item:last-child{border-bottom:none}
.lb-comments .comment-text{flex:1}
.lb-comments .comment-delete{background:none;border:none;color:#ff6b6b;cursor:pointer;font-size:.75rem;padding:2px 6px;opacity:.4;white-space:nowrap;transition:opacity .2s}
.lb-comments .comment-delete:hover{opacity:1}
.lb-comments .comment-reply{color:#86efac;font-size:.75rem;margin-top:2px;font-style:italic}
.day-comment-reply{color:var(--accent2);font-size:.75rem;margin-left:1rem;font-style:italic}
.comment-form{display:flex;gap:.5rem;margin-top:.5rem}
.comment-form input{flex:1;padding:8px 12px;border:1px solid var(--glass-border);border-radius:8px;backdrop-filter:blur(10px);background:rgba(255,255,255,.06);color:#fff;font-size:.85rem;outline:none;transition:border-color .2s}
.comment-form input::placeholder{color:rgba(255,255,255,.3)}
.comment-form input:focus{border-color:var(--accent)}
.comment-form button{padding:8px 16px;background:rgba(124,91,245,.3);border:1px solid rgba(124,91,245,.4);color:var(--accent2);border-radius:8px;cursor:pointer;font-size:.85rem;white-space:nowrap;backdrop-filter:blur(10px);transition:all .2s}
.comment-form button:hover{background:rgba(124,91,245,.5)}
.day-comments{margin-top:1rem;padding-top:.75rem;border-top:1px solid var(--border)}
.day-comments h4{font-size:.9rem;color:var(--text2);margin-bottom:.5rem}
.day-comment-item{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:8px;margin-bottom:4px;font-size:.85rem}
.day-comment-item .photo-ref{color:var(--accent2);font-size:.75rem;margin-right:.5rem}
.day-comment-item .comment-delete{background:none;border:none;color:#ff6b6b;cursor:pointer;font-size:.75rem;opacity:.4;transition:opacity .2s}
.day-comment-item .comment-delete:hover{opacity:1}
.day-comment-form{display:flex;gap:.5rem;margin-top:.5rem}
.day-comment-form input{flex:1;padding:8px 12px;border:1px solid var(--glass-border);border-radius:8px;background:rgba(255,255,255,.06);color:var(--text);font-size:.85rem;outline:none;transition:border-color .2s}
.day-comment-form input:focus{border-color:var(--accent)}
.day-comment-form button{padding:8px 16px;background:rgba(124,91,245,.3);border:1px solid rgba(124,91,245,.4);color:var(--accent2);border-radius:8px;cursor:pointer;font-size:.85rem;backdrop-filter:blur(10px);transition:all .2s}
.day-comment-form button:hover{background:rgba(124,91,245,.5)}
.loading{text-align:center;padding:3rem;color:var(--text2)}
.empty{text-align:center;padding:3rem;color:var(--text2)}
.page-wrap{display:flex;max-width:1100px;margin:0 auto;position:relative}
.timeline-nav{position:sticky;top:100px;align-self:flex-start;width:140px;min-width:140px;max-height:calc(100vh - 110px);overflow-y:auto;overflow-x:hidden;padding:0 0 .5rem .5rem;scrollbar-width:thin}
.timeline-nav::-webkit-scrollbar{width:3px}
.timeline-nav::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.timeline-nav .tl-year{font-size:.75rem;font-weight:700;color:var(--accent2);padding:6px 8px 4px;position:sticky;top:-1px;background:var(--bg);z-index:1;margin-top:0}
.timeline-nav .tl-item{display:block;padding:4px 10px;font-size:.75rem;color:var(--text2);cursor:pointer;border-left:2px solid var(--border);text-decoration:none;transition:all .2s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.timeline-nav .tl-item:hover{color:var(--accent2);border-left-color:var(--accent);background:rgba(124,91,245,.06)}
.timeline-nav .tl-item.active{color:var(--accent2);border-left-color:var(--accent);font-weight:600}

@media(max-width:768px){
  .timeline-nav{position:fixed;left:0;top:0;bottom:0;width:200px;max-height:100vh;z-index:200;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);background:rgba(15,15,26,.9);border-right:1px solid var(--glass-border);box-shadow:4px 0 24px rgba(0,0,0,.4);transform:translateX(-100%);transition:transform .3s ease;padding:.5rem 0;overflow-y:auto}
  .timeline-nav.open{transform:translateX(0)}
  .timeline-nav .tl-year{position:sticky;top:0;background:rgba(15,15,26,.95)}
  .page-wrap{display:block}
  .tl-fab{display:flex!important}
  .tl-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);z-index:199}
  .tl-overlay.open{display:block}
}

.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:1rem;margin:1rem 0}
.stat{text-align:center;padding:1rem;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);background:rgba(255,255,255,.05);border:1px solid var(--glass-border);border-radius:12px}
.stat .num{font-size:1.8rem;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat .label{font-size:.8rem;color:var(--text2)}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:#fff;font-size:2rem;padding:12px 16px;cursor:pointer;border-radius:12px;z-index:1001;transition:all .2s}
.lb-nav:hover{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.25)}
.lb-prev{left:1rem}
.lb-next{right:1rem}
@media(max-width:600px){
  .photo-grid{grid-template-columns:repeat(2,1fr)}
  .header h1{font-size:1.4rem}
  .lb-nav{padding:8px 12px;font-size:1.5rem}
}
.city-filter{display:flex;gap:.3rem;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:2px 0;flex-wrap:wrap;margin-top:.4rem;animation:fadeIn .8s ease}
.city-filter::-webkit-scrollbar{display:none}
.city-btn{backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);background:var(--glass);border:1px solid var(--glass-border);color:var(--text2);padding:5px 14px;border-radius:16px;cursor:pointer;font-size:.8rem;white-space:nowrap;transition:all .3s}
.city-btn:hover{background:rgba(255,255,255,.12);color:var(--text);border-color:rgba(255,255,255,.2)}
.city-btn.active{background:rgba(124,91,245,.2);color:var(--accent2);font-weight:600;border-color:var(--accent);box-shadow:0 0 16px var(--accent-glow)}
.tl-fab{display:none;position:fixed;left:1rem;bottom:1.5rem;width:48px;height:48px;border-radius:50%;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);background:rgba(124,91,245,.3);border:1px solid rgba(124,91,245,.4);color:var(--accent2);font-size:1.3rem;align-items:center;justify-content:center;cursor:pointer;z-index:201;box-shadow:0 4px 20px var(--accent-glow);transition:all .2s}
.tl-fab:hover{background:rgba(124,91,245,.5);box-shadow:0 4px 30px rgba(124,91,245,.5)}
</style>
</head>
<body>
<div class="header">
  <div class="header-row">
    <h1>Wesley's Life Timeline</h1>
    <div class="nav">
      <button class="active" onclick="showView('timeline')">日视图</button>
      <button onclick="showView('weekly')">周视图</button>
      <button onclick="showView('monthly')">月视图</button>
    </div>
  </div>
  <div class="city-filter" id="city-filter"></div>
</div>

<button class="tl-fab" id="tl-fab" onclick="toggleTimelineNav()">☰</button>
<div class="tl-overlay" id="tl-overlay" onclick="toggleTimelineNav()"></div>

<div class="page-wrap">
<div class="timeline-nav" id="timeline-nav"></div>
<div class="container" id="content">
  <div class="loading">加载中...</div>
</div>
</div>

<div class="lightbox" id="lightbox">
  <button class="close" onclick="closeLightbox()">&times;</button>
  <button class="lb-hide" id="lb-hide-btn" onclick="hidePhoto()">隐藏此照片</button>
  <button class="lb-nav lb-prev" onclick="navLightbox(-1);event.stopPropagation()">&#8249;</button>
  <button class="lb-nav lb-next" onclick="navLightbox(1);event.stopPropagation()">&#8250;</button>
  <div class="lb-img-wrap" id="lb-img-wrap" onclick="event.stopPropagation()">
    <img id="lb-img" src="">
  </div>
  <div class="lb-bottom" onclick="event.stopPropagation()">
    <div class="info" id="lb-info"></div>
    <div class="lb-comments" id="lb-comments"></div>
  </div>
</div>

<script>
const WEEKDAYS = ['日','一','二','三','四','五','六'];
let allDays = [];
let selectedCity = null;
let currentView = 'timeline';
let commentsCache = {};
let currentLbDate = null, currentLbIndex = null, currentLbPhotos = [];

async function fetchJSON(url) {
  const r = await fetch(url);
  if (!r.ok) return null;
  return r.json();
}

async function loadComments(date) {
  if (commentsCache[date]) return commentsCache[date];
  commentsCache[date] = await fetchJSON(`/api/comments/${date}`) || [];
  return commentsCache[date];
}

async function init() {
  allDays = await fetchJSON('/api/days') || [];
  await loadCityFilter();
  showView('timeline');
}

async function loadCityFilter() {
  const cities = await fetchJSON('/api/cities') || [];
  const el = document.getElementById('city-filter');
  if (!cities.length) { el.style.display = 'none'; return; }
  // Show top 8 cities only, rest behind "more" toggle
  const topCities = cities.slice(0, 8);
  let html = `<button class="city-btn active" onclick="filterCity(null,this)">全部</button>`;
  topCities.forEach(c => { html += `<button class="city-btn" onclick="filterCity('${c.name}',this)">${c.name} (${c.count})</button>`; });
  if (cities.length > 8) {
    html += `<button class="city-btn" onclick="expandCities(this)" id="city-more">更多 (${cities.length - 8})</button>`;
    window._allCities = cities;
  }
  el.innerHTML = html;
}

function toggleTimelineNav() {
  const nav = document.getElementById('timeline-nav');
  const overlay = document.getElementById('tl-overlay');
  const isOpen = nav.classList.toggle('open');
  overlay.classList.toggle('open', isOpen);
  if (isOpen) {
    const active = nav.querySelector('.tl-item.active');
    if (active) active.scrollIntoView({ block: 'center' });
  }
}

function filterCity(city, btn) {
  selectedCity = city;
  document.querySelectorAll('.city-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  showView(currentView);
}

function expandCities(btn) {
  if (!window._allCities) return;
  const el = document.getElementById('city-filter');
  let html = `<button class="city-btn active" onclick="filterCity(null,this)">全部</button>`;
  window._allCities.forEach(c => { html += `<button class="city-btn" onclick="filterCity('${c.name}',this)">${c.name} (${c.count})</button>`; });
  el.innerHTML = html;
}

function getFilteredDays() {
  if (!selectedCity) return allDays;
  return allDays.filter(d => d.cities && d.cities.includes(selectedCity));
}

function showView(view) {
  currentView = view;
  document.querySelectorAll('.nav button').forEach((b,i) => {
    b.classList.toggle('active', ['timeline','weekly','monthly'][i] === view);
  });
  if (view === 'timeline') renderTimeline();
  else if (view === 'weekly') renderWeekly();
  else if (view === 'monthly') renderMonthly();
}

const PAGE_SIZE = 10;
let renderedCount = 0;
let currentFilteredDays = [];
let loadingMore = false;

function renderTimeline() {
  currentFilteredDays = getFilteredDays();
  renderedCount = 0;
  if (!currentFilteredDays.length) { document.getElementById('content').innerHTML = '<div class="empty">暂无数据</div>'; return; }
  document.getElementById('content').innerHTML = '';
  loadMoreDays();
  buildTimelineNav('day');
  setupInfiniteScroll();
}

let _navClickLock = false;
function scrollToTarget(targetId) {
  if (window.innerWidth <= 768) toggleTimelineNav();
  let el = document.getElementById(targetId);
  if (!el && currentView === 'timeline') {
    while (!el && renderedCount < currentFilteredDays.length) {
      loadMoreDays();
      el = document.getElementById(targetId);
    }
  }
  if (!el) return;
  // Manually highlight the clicked nav item and lock observer
  _navClickLock = true;
  document.querySelectorAll('.timeline-nav .tl-item').forEach(ni => ni.classList.toggle('active', ni.dataset.target === targetId));
  const activeNav = document.querySelector('.timeline-nav .tl-item.active');
  if (activeNav) activeNav.scrollIntoView({block:'nearest', behavior:'smooth'});
  el.scrollIntoView({behavior:'smooth',block:'start'});
  // Unlock observer after scroll finishes
  clearTimeout(window._navLockTimer);
  window._navLockTimer = setTimeout(() => { _navClickLock = false; }, 1500);
}

function loadMoreDays() {
  if (loadingMore || renderedCount >= currentFilteredDays.length) return;
  loadingMore = true;
  const content = document.getElementById('content');
  const batch = currentFilteredDays.slice(renderedCount, renderedCount + PAGE_SIZE);
  batch.forEach(day => {
    content.insertAdjacentHTML('beforeend', renderDayCard(day));
  });
  renderedCount += batch.length;
  observePhotoGrids();
  loadingMore = false;
}

function setupInfiniteScroll() {
  if (window._scrollSentinel) window._scrollSentinel.remove();
  const sentinel = document.createElement('div');
  sentinel.id = 'scroll-sentinel';
  sentinel.style.height = '1px';
  document.getElementById('content').after(sentinel);
  window._scrollSentinel = sentinel;

  if (window._infiniteObserver) window._infiniteObserver.disconnect();
  window._infiniteObserver = new IntersectionObserver(entries => {
    if (entries[0].isIntersecting && renderedCount < currentFilteredDays.length) {
      loadMoreDays();
    }
  }, { rootMargin: '600px' });
  window._infiniteObserver.observe(sentinel);
}

function observePhotoGrids() {
  if (!window._photoObserver) {
    window._photoObserver = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          const date = e.target.id.replace('photos-', '');
          if (!e.target.dataset.loaded) {
            e.target.dataset.loaded = '1';
            loadDayPhotos(date);
          }
          window._photoObserver.unobserve(e.target);
        }
      });
    }, { rootMargin: '400px' });
  }
  document.querySelectorAll('.photo-grid:not([data-loaded])').forEach(el => {
    window._photoObserver.observe(el);
  });
}

function renderDayCard(day) {
  const d = new Date(day.date + 'T00:00:00');
  const wd = WEEKDAYS[d.getDay()];
  const s = day.summary || {};
  let html = `<div class="day-card" id="day-${day.date}">
    <div class="day-date">${day.date} <span class="weekday">星期${wd}</span> <span class="weekday">${day.photo_count}张</span></div>
    <div class="summary-text">${s.summary || ''}</div>`;
  if (s.highlights?.length) {
    html += `<div class="highlights"><h4>✨ 亮点</h4><ul>${s.highlights.map(h=>`<li>${h}</li>`).join('')}</ul></div>`;
  }
  if (s.activities?.length || s.locations?.length) {
    html += '<div class="meta-tags">';
    (s.activities||[]).forEach(a => html += `<span class="tag">${a}</span>`);
    (s.locations||[]).forEach(l => html += `<span class="tag">${l}</span>`);
    html += '</div>';
  }
  html += `<div class="photo-grid" id="photos-${day.date}"></div>`;
  html += `<div class="day-comments" id="day-comments-${day.date}"></div>`;
  html += `</div>`;
  return html;
}

async function loadDayPhotos(date) {
  const data = await fetchJSON(`/api/day/${date}`);
  if (!data?.photos) return;
  const comments = await loadComments(date);
  const grid = document.getElementById(`photos-${date}`);
  if (!grid) return;

  if (!window._dayPhotos) window._dayPhotos = {};
  window._dayPhotos[date] = data.photos;

  const visible = data.photos.map((p, idx) => ({...p, _idx: idx})).filter(p => !p.hidden);
  grid.innerHTML = visible.map(p => {
    const idx = p._idx;
    const blobBase = 'https://lifetimelinewesley.blob.core.windows.net/photos';
    const thumbSrc = `${blobBase}/${date}/thumbs/${encodeURIComponent(p.filename)}`;
    const desc = p.analysis?.description || '';
    const photoComments = comments.filter(c => c.photoIndex === idx);
    const badge = photoComments.length ? `<div class="photo-comment-badge">${photoComments.length}</div>` : '';
    const locTag = p.metadata?.address ? `<div class="photo-loc">📍${p.metadata.address}</div>` : '';
    return `<div class="photo-item" onclick="openLightbox('${date}',${idx})">
      <img src="${thumbSrc}" alt="${desc}" loading="lazy">
      ${badge}
      <div class="photo-caption"><div class="photo-time">${p.time}</div>${p.analysis?.activity||''}${locTag}</div>
    </div>`;
  }).join('');

  renderDayComments(date, comments);
}

function renderDayComments(date, comments) {
  const container = document.getElementById(`day-comments-${date}`);
  if (!container) return;
  const dayComments = comments.filter(c => c.photoIndex === null || c.photoIndex === undefined);
  const photoComments = comments.filter(c => c.photoIndex !== null && c.photoIndex !== undefined);

  let html = '';
  if (dayComments.length || photoComments.length) {
    html += `<h4>备注 (${comments.length})</h4>`;
    comments.forEach(c => {
      const photoRef = (c.photoIndex !== null && c.photoIndex !== undefined)
        ? `<span class="photo-ref">[照片${c.photoIndex+1}]</span>` : '';
      const reply = c.reply ? `<div class="day-comment-reply">↳ ${esc(c.reply)}</div>` : '';
      html += `<div class="day-comment-item">
        <div><span>${photoRef}${esc(c.text)}</span>${reply}</div>
        <button class="comment-delete" onclick="deleteComment('${date}','${c.id}')">删除</button>
      </div>`;
    });
  }
  html += `<div class="day-comment-form">
    <input type="text" placeholder="添加这一天的备注..." onkeydown="if(event.key==='Enter')addDayComment('${date}',this)">
    <button onclick="addDayComment('${date}',this.previousElementSibling)">添加</button>
  </div>`;
  container.innerHTML = html;
}

async function addDayComment(date, input) {
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  await fetch(`/api/comments/${date}`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ text, photoIndex: null })
  });
  delete commentsCache[date];
  const comments = await loadComments(date);
  renderDayComments(date, comments);
}

async function deleteComment(date, id) {
  await fetch(`/api/comments/${date}/${id}`, { method: 'DELETE' });
  delete commentsCache[date];
  const comments = await loadComments(date);
  renderDayComments(date, comments);
  if (currentLbDate === date) renderLbComments();
  loadDayPhotos(date);
}

function openLightbox(date, idx) {
  const photos = window._dayPhotos?.[date];
  if (!photos) return;
  currentLbDate = date;
  currentLbIndex = idx;
  currentLbPhotos = photos;
  showLbPhoto();
  document.getElementById('lightbox').classList.add('show');
  if (event) event.stopPropagation();
}

function showLbPhoto() {
  const p = currentLbPhotos[currentLbIndex];
  if (!p) return;
  const blobBase = 'https://lifetimelinewesley.blob.core.windows.net/photos';
  const medName = p.filename.replace(/\.[^.]+$/, '.jpg');
  const medSrc = `${blobBase}/${currentLbDate}/medium/${encodeURIComponent(medName)}`;
  const thumbSrc = `${blobBase}/${currentLbDate}/thumbs/${encodeURIComponent(p.filename)}`;
  const img = document.getElementById('lb-img');
  img.src = medSrc;
  img.onerror = function() { this.onerror = null; this.src = thumbSrc; };
  const loc = p.metadata?.address || p.analysis?.location || '';
  const locHtml = loc ? `<br>📍 ${loc}` : '';
  const gps = p.metadata?.gps;
  let gpsLink = '';
  if (gps) {
    const PI = Math.PI, a = 6378245.0, ee = 0.00669342162296594;
    function outOfChina(lng,lat){return lng<72.004||lng>137.8347||lat<0.8293||lat>55.8271}
    function transformLat(x,y){let r=-100+2*x+3*y+.2*y*y+.1*x*y+.2*Math.sqrt(Math.abs(x));r+=2*(20*Math.sin(6*x*PI)+20*Math.sin(2*x*PI))/3;r+=2*(20*Math.sin(y*PI)+40*Math.sin(y/3*PI))/3;r+=2*(160*Math.sin(y/12*PI)+320*Math.sin(y*PI/30))/3;return r}
    function transformLng(x,y){let r=300+x+2*y+.1*x*x+.1*x*y+.1*Math.sqrt(Math.abs(x));r+=2*(20*Math.sin(6*x*PI)+20*Math.sin(2*x*PI))/3;r+=2*(20*Math.sin(x*PI)+40*Math.sin(x/3*PI))/3;r+=2*(150*Math.sin(x/12*PI)+300*Math.sin(x/30*PI))/3;return r}
    function wgs84ToGcj02(lng,lat){if(outOfChina(lng,lat))return[lng,lat];let dLat=transformLat(lng-105,lat-35),dLng=transformLng(lng-105,lat-35);const radLat=lat/180*PI,magic=1-ee*Math.sin(radLat)*Math.sin(radLat),sqrtMagic=Math.sqrt(magic);dLat=dLat*180/(a*(1-ee)/(magic*sqrtMagic)*PI);dLng=dLng*180/(a/sqrtMagic*Math.cos(radLat)*PI);return[lng+dLng,lat+dLat]}
    const [gcjLng,gcjLat] = wgs84ToGcj02(gps.longitude, gps.latitude);
    const locName = encodeURIComponent(loc);
    gpsLink = ` <a href="https://uri.amap.com/marker?position=${gcjLng},${gcjLat}&name=${locName}" target="_blank" style="color:var(--accent2);font-size:.75rem">[高德]</a>`
            + ` <a href="https://www.google.com/maps?q=${gps.latitude},${gps.longitude}" target="_blank" style="color:var(--accent2);font-size:.75rem">[谷歌]</a>`;
  }
  document.getElementById('lb-info').innerHTML =
    `<strong>${p.time}</strong>${locHtml}${gpsLink}<br>${p.analysis?.description||''}`;
  renderLbComments();
}

async function renderLbComments() {
  const el = document.getElementById('lb-comments');
  const comments = await loadComments(currentLbDate);
  const photoComments = comments.filter(c => c.photoIndex === currentLbIndex);

  let html = '';
  photoComments.forEach(c => {
    const reply = c.reply ? `<div class="comment-reply">↳ ${esc(c.reply)}</div>` : '';
    html += `<div class="comment-item">
      <div class="comment-text">${esc(c.text)}${reply}</div>
      <button class="comment-delete" onclick="deleteComment('${currentLbDate}','${c.id}')">删除</button>
    </div>`;
  });
  html += `<div class="comment-form">
    <input type="text" id="lb-comment-input" placeholder="添加备注，如：这是我老婆，不是朋友..."
      onkeydown="if(event.key==='Enter')addLbComment()">
    <button onclick="addLbComment()">发送</button>
  </div>`;

}

async function addLbComment() {
  const input = document.getElementById('lb-comment-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  await fetch(`/api/comments/${currentLbDate}`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ text, photoIndex: currentLbIndex })
  });

function navLightbox(dir) {
  let newIdx = currentLbIndex + dir;
  while (newIdx >= 0 && newIdx < currentLbPhotos.length && currentLbPhotos[newIdx]?.hidden) {
    newIdx += dir;
  }
  if (newIdx >= 0 && newIdx < currentLbPhotos.length) {
    currentLbIndex = newIdx;
    resetZoom();
    showLbPhoto();
  }
}

function closeLightbox() {
  resetZoom();
  document.getElementById('lightbox').classList.remove('show');
}

// --- Zoom & Pan ---
let _zoomScale = 1, _zoomX = 0, _zoomY = 0;
let _pinchStartDist = 0, _pinchStartScale = 1;
let _panStartX = 0, _panStartY = 0, _panStartZX = 0, _panStartZY = 0, _isPanning = false;
let _lastTap = 0;
const ZOOM_MIN = 1, ZOOM_MAX = 5;

function applyZoom() {
  const img = document.getElementById('lb-img');
  const wrap = document.getElementById('lb-img-wrap');
  img.style.transform = `translate(${_zoomX}px,${_zoomY}px) scale(${_zoomScale})`;
  img.style.transition = _isPanning ? 'none' : 'transform .2s ease';
  wrap.classList.toggle('zoomed', _zoomScale > 1.05);
}

function resetZoom() {
  _zoomScale = 1; _zoomX = 0; _zoomY = 0; _isPanning = false;
  const img = document.getElementById('lb-img');
  if (img) { img.style.transform = ''; img.style.transition = 'transform .2s ease'; }
  document.getElementById('lb-img-wrap')?.classList.remove('zoomed');
}

function clampPan() {
  if (_zoomScale <= 1) { _zoomX = 0; _zoomY = 0; return; }
  const wrap = document.getElementById('lb-img-wrap');
  const r = wrap.getBoundingClientRect();
  const maxX = r.width * (_zoomScale - 1) / 2;
  const maxY = r.height * (_zoomScale - 1) / 2;
  _zoomX = Math.max(-maxX, Math.min(maxX, _zoomX));
  _zoomY = Math.max(-maxY, Math.min(maxY, _zoomY));
}

(function initZoom() {
  const wrap = document.getElementById('lb-img-wrap');

  // Double-tap to zoom (mobile) / double-click (desktop)
  wrap.addEventListener('dblclick', e => {
    e.preventDefault(); e.stopPropagation();
    if (_zoomScale > 1.05) { resetZoom(); applyZoom(); }
    else { _zoomScale = 3; _zoomX = 0; _zoomY = 0; applyZoom(); }
  });

  // Touch: pinch-to-zoom + pan
  wrap.addEventListener('touchstart', e => {
    if (e.touches.length === 2) {
      e.preventDefault();
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      _pinchStartDist = Math.hypot(dx, dy);
      _pinchStartScale = _zoomScale;
    } else if (e.touches.length === 1 && _zoomScale > 1.05) {
      _isPanning = true;
      _panStartX = e.touches[0].clientX; _panStartY = e.touches[0].clientY;
      _panStartZX = _zoomX; _panStartZY = _zoomY;
    }
    // double-tap detection
    if (e.touches.length === 1) {
      const now = Date.now();
      if (now - _lastTap < 300) {
        e.preventDefault();
        if (_zoomScale > 1.05) { resetZoom(); applyZoom(); }
        else { _zoomScale = 3; applyZoom(); }
      }
      _lastTap = now;
    }
  }, {passive:false});

  wrap.addEventListener('touchmove', e => {
    if (e.touches.length === 2) {
      e.preventDefault();
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      const dist = Math.hypot(dx, dy);
      _zoomScale = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, _pinchStartScale * (dist / _pinchStartDist)));
      clampPan(); applyZoom();
    } else if (e.touches.length === 1 && _isPanning) {
      e.preventDefault();
      _zoomX = _panStartZX + (e.touches[0].clientX - _panStartX);
      _zoomY = _panStartZY + (e.touches[0].clientY - _panStartY);
      clampPan(); applyZoom();
    }
  }, {passive:false});

  wrap.addEventListener('touchend', e => {
    _isPanning = false;
    if (_zoomScale < 1.05) resetZoom();
    applyZoom();
  });

  // Mouse: scroll wheel zoom
  wrap.addEventListener('wheel', e => {
    e.preventDefault(); e.stopPropagation();
    const delta = e.deltaY > 0 ? -0.3 : 0.3;
    _zoomScale = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, _zoomScale + delta));
    if (_zoomScale < 1.05) { _zoomScale = 1; _zoomX = 0; _zoomY = 0; }
    clampPan(); applyZoom();
  }, {passive:false});

  // Mouse: drag to pan when zoomed
  wrap.addEventListener('mousedown', e => {
    if (_zoomScale > 1.05) {
      _isPanning = true;
      _panStartX = e.clientX; _panStartY = e.clientY;
      _panStartZX = _zoomX; _panStartZY = _zoomY;
      e.preventDefault();
    }
  });
  document.addEventListener('mousemove', e => {
    if (!_isPanning) return;
    _zoomX = _panStartZX + (e.clientX - _panStartX);
    _zoomY = _panStartZY + (e.clientY - _panStartY);
    clampPan(); applyZoom();
  });
  document.addEventListener('mouseup', () => { _isPanning = false; });
})();

async function hidePhoto() {
  if (!confirm('确定要隐藏这张照片吗？隐藏后摘要会自动重新生成。')) return;
  const p = currentLbPhotos[currentLbIndex];
  await fetch(`/api/day/${currentLbDate}/hide-photo`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ photoIndex: currentLbIndex })
  });
  closeLightbox();
  delete commentsCache[currentLbDate];
  loadDayPhotos(currentLbDate);
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

async function renderWeekly() {
  const content = document.getElementById('content');
  if (!allDays.length) { content.innerHTML = '<div class="empty">暂无数据</div>'; return; }
  const weeks = {};
  getFilteredDays().forEach(day => {
    const d = new Date(day.date + 'T00:00:00');
    const weekStart = new Date(d);
    weekStart.setDate(d.getDate() - d.getDay());
    const key = weekStart.toISOString().split('T')[0];
    if (!weeks[key]) weeks[key] = [];
    weeks[key].push(day);
  });
  let html = '';
  Object.keys(weeks).sort().reverse().forEach(weekStart => {
    const days = weeks[weekStart];
    const totalPhotos = days.reduce((s,d) => s + d.photo_count, 0);
    const allActivities = [...new Set(days.flatMap(d => d.summary?.activities || []))];
    const weekEnd = new Date(weekStart + 'T00:00:00');
    weekEnd.setDate(weekEnd.getDate() + 6);
    html += `<div class="week-summary">
      <h3>${weekStart} ~ ${weekEnd.toISOString().split('T')[0]}</h3>
      <div class="stats">
        <div class="stat"><div class="num">${days.length}</div><div class="label">天有记录</div></div>
        <div class="stat"><div class="num">${totalPhotos}</div><div class="label">张照片</div></div>
        <div class="stat"><div class="num">${allActivities.length}</div><div class="label">种活动</div></div>
      </div>
      <div class="meta-tags" style="margin-top:.5rem">${allActivities.map(a=>`<span class="tag" style="background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2);color:#fff">${a}</span>`).join('')}</div>
    </div>`;
    days.forEach(day => html += renderDayCard(day));
  });
  content.innerHTML = html;
  observePhotoGrids();
  buildTimelineNav('week');
}

async function renderMonthly() {
  const content = document.getElementById('content');
  if (!allDays.length) { content.innerHTML = '<div class="empty">暂无数据</div>'; return; }
  const months = {};
  getFilteredDays().forEach(day => {
    const key = day.date.substring(0, 7);
    if (!months[key]) months[key] = [];
    months[key].push(day);
  });
  let html = '';
  Object.keys(months).sort().reverse().forEach(month => {
    const days = months[month];
    const totalPhotos = days.reduce((s,d) => s + d.photo_count, 0);
    const allActivities = [...new Set(days.flatMap(d => d.summary?.activities || []))];
    const allLocations = [...new Set(days.flatMap(d => d.summary?.locations || []))];
    html += `<div class="month-summary">
      <h3>${month}</h3>
      <div class="stats">
        <div class="stat"><div class="num">${days.length}</div><div class="label">天有记录</div></div>
        <div class="stat"><div class="num">${totalPhotos}</div><div class="label">张照片</div></div>
        <div class="stat"><div class="num">${allActivities.length}</div><div class="label">种活动</div></div>
        <div class="stat"><div class="num">${allLocations.length}</div><div class="label">个地点</div></div>
      </div>
      <div class="meta-tags" style="margin-top:.5rem">
        ${allActivities.map(a=>`<span class="tag" style="background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2);color:#fff">${a}</span>`).join('')}
        ${allLocations.slice(0,8).map(l=>`<span class="tag" style="background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2);color:#fff">${l}</span>`).join('')}
      </div>
    </div>`;
    days.forEach(day => html += renderDayCard(day));
  });
  content.innerHTML = html;
  observePhotoGrids();
  buildTimelineNav('month');
}

function buildTimelineNav(mode) {
  const nav = document.getElementById('timeline-nav');
  if (!nav || !allDays.length) { if(nav) nav.innerHTML=''; return; }
  let items = [];
  if (mode === 'day') {
    const byMonth = {};
    allDays.forEach(d => {
      const ym = d.date.substring(0, 7);
      if (!byMonth[ym]) byMonth[ym] = [];
      byMonth[ym].push(d);
    });
    Object.keys(byMonth).sort().reverse().forEach(ym => {
      items.push({type:'year', label: ym});
      byMonth[ym].forEach(d => {
        const dd = new Date(d.date + 'T00:00:00');
        const wd = WEEKDAYS[dd.getDay()];
        items.push({type:'item', label: `${d.date.substring(5)} 周${wd}`, targetId: `day-${d.date}`});
      });
    });
  } else if (mode === 'week') {
    const seenYears = {};
    const weeks = {};
    allDays.forEach(d => {
      const dt = new Date(d.date + 'T00:00:00');
      const ws = new Date(dt); ws.setDate(dt.getDate() - dt.getDay() + 1);
      const key = ws.toISOString().split('T')[0];
      if (!weeks[key]) weeks[key] = [];
      weeks[key].push(d);
    });
    Object.keys(weeks).sort().reverse().forEach(ws => {
      const yr = ws.substring(0, 4);
      if (!seenYears[yr]) { seenYears[yr] = true; items.push({type:'year', label: yr}); }
      const we = new Date(ws + 'T00:00:00'); we.setDate(we.getDate() + 6);
      items.push({type:'item', label: `${ws.substring(5)} ~ ${we.toISOString().split('T')[0].substring(5)}`, targetId: `day-${weeks[ws][0].date}`});
    });
  } else if (mode === 'month') {
    const seenYears = {};
    const months = {};
    allDays.forEach(d => {
      const ym = d.date.substring(0, 7);
      if (!months[ym]) months[ym] = [];
      months[ym].push(d);
    });
    const mNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
    Object.keys(months).sort().reverse().forEach(ym => {
      const yr = ym.substring(0, 4);
      if (!seenYears[yr]) { seenYears[yr] = true; items.push({type:'year', label: yr}); }
      items.push({type:'item', label: mNames[parseInt(ym.substring(5))-1], targetId: `day-${months[ym][0].date}`});
    });
  }

  let html = '';
  items.forEach(it => {
    if (it.type === 'year') {
      html += `<div class="tl-year">${it.label}</div>`;
    } else {
      html += `<div class="tl-item" data-target="${it.targetId}" onclick="scrollToTarget('${it.targetId}')">${it.label}</div>`;
    }
  });
  nav.innerHTML = html;
  const hdr = document.querySelector('.header');
  if (hdr) {
    const hh = hdr.offsetHeight + 8;
    nav.style.top = hh + 'px';
    nav.style.maxHeight = 'calc(100vh - ' + (hh + 10) + 'px)';
  }
  setupNavHighlight();
}

function setupNavHighlight() {
  const navItems = document.querySelectorAll('.timeline-nav .tl-item');
  if (!navItems.length) return;
  const cards = document.querySelectorAll('.day-card');
  if (!cards.length) return;

  if (window._navObserver) window._navObserver.disconnect();
  window._navObserver = new IntersectionObserver(entries => {
    if (_navClickLock) return;
    entries.forEach(e => {
      if (e.isIntersecting) {
        const id = e.target.id;
        navItems.forEach(ni => ni.classList.toggle('active', ni.dataset.target === id));
        const active = document.querySelector('.timeline-nav .tl-item.active');
        if (active) active.scrollIntoView({block:'nearest', behavior:'smooth'});
      }
    });
  }, {rootMargin: '-120px 0px -60% 0px'});

  cards.forEach(c => window._navObserver.observe(c));
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') navLightbox(-1);
  if (e.key === 'ArrowRight') navLightbox(1);
});
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === document.getElementById('lightbox')) closeLightbox();
});

init();
